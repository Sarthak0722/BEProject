version: '3.8'

services:
  # Frontend Control Panel
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SIMULATOR_URL=http://localhost:4000
    depends_on:
      - simulation-engine
    networks:
      - kendra-network

  # Simulation Engine
  simulation-engine:
    build: ./simulation-engine
    ports:
      - "4000:4000"
    volumes:
      - ./simulation-engine/services.json:/app/services.json
    environment:
      - NODE_ENV=development
    networks:
      - kendra-network

  # Microservice Actors
  api-gateway:
    build: ./microservices/api-gateway
    ports:
      - "8001:3000"
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3000
      - USER_SERVICE_URL=http://user-service:3000
      - ORDER_SERVICE_URL=http://order-service:3000
      - PRODUCT_SERVICE_URL=http://product-service:3000
    depends_on:
      - auth-service
      - user-service
      - order-service
      - product-service
    networks:
      - kendra-network

  auth-service:
    build: ./microservices/auth-service
    ports:
      - "8002:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
    depends_on:
      - database-service
    networks:
      - kendra-network

  user-service:
    build: ./microservices/user-service
    ports:
      - "8003:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
    depends_on:
      - database-service
    networks:
      - kendra-network

  order-service:
    build: ./microservices/order-service
    ports:
      - "8004:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
      - PRODUCT_SERVICE_URL=http://product-service:3000
      - USER_SERVICE_URL=http://user-service:3000
    depends_on:
      - database-service
      - product-service
      - user-service
    networks:
      - kendra-network

  product-service:
    build: ./microservices/product-service
    ports:
      - "8005:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
    depends_on:
      - database-service
    networks:
      - kendra-network

  database-service:
    build: ./microservices/database-service
    ports:
      - "8006:3000"
    environment:
      - PORT=3000
    networks:
      - kendra-network

networks:
  kendra-network:
    driver: bridge
