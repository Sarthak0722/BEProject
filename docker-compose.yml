version: '3.8'

services:
  # ── Frontend Control Panel ──────────────────────────────────────────────
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - REACT_APP_SIMULATOR_URL=http://localhost:4001
      - REACT_APP_ML_URL=http://localhost:5001
    depends_on:
      - simulation-engine
      - log-analyzer
    networks:
      - kendra-network

  # ── Simulation Engine ───────────────────────────────────────────────────
  simulation-engine:
    build: ./simulation-engine
    ports:
      - "4001:4000"
    volumes:
      - ./simulation-engine/services.json:/app/services.json
    environment:
      - NODE_ENV=development
      - PORT=4000
      - FRONTEND_URL=http://localhost:3000
    networks:
      - kendra-network

  # ── ML / Log Analyzer ──────────────────────────────────────────────────
  log-analyzer:
    build: ./log-analyzer
    ports:
      - "5001:5001"
    volumes:
      - ./log-analyzer/sample_logs:/app/sample_logs
      - ./simulation-engine/services.json:/app/../simulation-engine/services.json
    environment:
      - PORT=5001
    networks:
      - kendra-network

  # ── Microservice Actors ─────────────────────────────────────────────────
  api-gateway:
    build: ./microservices/api-gateway
    ports:
      - "8001:3000"
    environment:
      - PORT=3000
      - AUTH_SERVICE_URL=http://auth-service:3000
      - USER_SERVICE_URL=http://user-service:3000
      - ORDER_SERVICE_URL=http://order-service:3000
      - PRODUCT_SERVICE_URL=http://product-service:3000
    depends_on:
      - auth-service
      - user-service
      - order-service
      - product-service
    networks:
      - kendra-network

  auth-service:
    build: ./microservices/auth-service
    ports:
      - "8002:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
    depends_on:
      - database-service
    networks:
      - kendra-network

  user-service:
    build: ./microservices/user-service
    ports:
      - "8003:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
    depends_on:
      - database-service
    networks:
      - kendra-network

  order-service:
    build: ./microservices/order-service
    ports:
      - "8004:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
      - PRODUCT_SERVICE_URL=http://product-service:3000
      - USER_SERVICE_URL=http://user-service:3000
    depends_on:
      - database-service
      - product-service
      - user-service
    networks:
      - kendra-network

  product-service:
    build: ./microservices/product-service
    ports:
      - "8005:3000"
    environment:
      - PORT=3000
      - DATABASE_SERVICE_URL=http://database-service:3000
    depends_on:
      - database-service
    networks:
      - kendra-network

  database-service:
    build: ./microservices/database-service
    ports:
      - "8006:3000"
    environment:
      - PORT=3000
    networks:
      - kendra-network

networks:
  kendra-network:
    driver: bridge
